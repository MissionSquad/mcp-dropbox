name: Publish to npm

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org/'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Run Tests
        run: npm test

      - name: Run Typecheck
        run: npm run typecheck

      - name: Validate Docker Build
        run: docker build -t dbx-mcp-server-ci .

      - name: Determine Publish Eligibility
        id: publish_eligibility
        shell: bash
        run: |
          if [ -z "${{ secrets.NPM_TOKEN }}" ]; then
            echo "can_publish=false" >> "$GITHUB_OUTPUT"
            echo "reason=missing_npm_token" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "can_publish=false" >> "$GITHUB_OUTPUT"
            echo "reason=version_already_published" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "can_publish=true" >> "$GITHUB_OUTPUT"
          echo "reason=ready" >> "$GITHUB_OUTPUT"

      - name: Publish to npm
        if: steps.publish_eligibility.outputs.can_publish == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish Skipped
        if: steps.publish_eligibility.outputs.can_publish != 'true'
        run: |
          echo "Skipping npm publish: ${{ steps.publish_eligibility.outputs.reason }}"
